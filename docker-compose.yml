version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: sello-verde-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sello_verde_2024}
      POSTGRES_DB: ${DB_NAME:-sello_verde}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-sello_verde}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sello-verde-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sello-verde-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DB_USER:-postgres}
      DATABASE_PASSWORD: ${DB_PASSWORD:-sello_verde_2024}
      DATABASE_NAME: ${DB_NAME:-sello_verde}
      JWT_SECRET: ${JWT_SECRET:-sello-verde-mvp-secret-2024}
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - backend_uploads:/app/uploads
    networks:
      - sello-verde-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sello-verde-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${BACKEND_PORT:-3001}/api
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - sello-verde-network

volumes:
  postgres_data:
  backend_uploads:

networks:
  sello-verde-network:
    driver: bridge
