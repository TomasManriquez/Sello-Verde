# ══════════════════════════════════════════════════════════════
#  Nginx — Configuración de host para Sello Verde
#  Dominio: selloverde.slepllanquihue.gob.cl
#
#  INSTRUCCIONES DE INSTALACIÓN EN EL SERVIDOR:
#
#  1. Copiar este archivo al servidor:
#     sudo cp sello-verde.conf /etc/nginx/sites-available/sello-verde
#
#  2. Activar el sitio:
#     sudo ln -s /etc/nginx/sites-available/sello-verde \
#                /etc/nginx/sites-enabled/sello-verde
#
#  3. Verificar sintaxis:
#     sudo nginx -t
#
#  4. Recargar Nginx:
#     sudo systemctl reload nginx
#
#  5. Obtener certificado SSL con Certbot :
#     sudo certbot --nginx -d selloverde.slepllanquihue.gob.cl
#
#  Certbot modificará automáticamente este archivo para agregar HTTPS.
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name selloverde.slepllanquihue.gob.cl;

    # ── Límite de tamaño para subida de documentos (50 MB backend + margen) ──
    client_max_body_size 55m;

    # ── Proxy al contenedor Next.js ───────────────────────────────
    # El frontend escucha en 127.0.0.1:3080 (definido en docker-compose.prod.yml)
    location / {
        proxy_pass         http://127.0.0.1:3080;
        proxy_http_version 1.1;

        # Headers necesarios para Next.js y WebSockets (HMR en dev si aplica)
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts — la descarga de archivos grandes puede tardar
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout    120s;
    }

    # Certbot agregará aquí el bloque SSL (listen 443, ssl_certificate, etc.)
}
